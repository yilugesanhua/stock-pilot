name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: latest
      - run: uv sync --project skill/stock-pilot
      - run: uv run --project skill/stock-pilot python -m unittest discover -s skill/stock-pilot/tests -v
