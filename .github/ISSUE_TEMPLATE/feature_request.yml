name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should be improved?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This does not require automatic trading, account access or position sizing.
          required: true
        - label: Any proposed data source has a documented license and usage policy.
          required: true
